<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VODIKA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ================= الأساسيات والألوان ================= */
        :root {
            --bg-dark: #050508;
            --neon-glow: rgba(255, 255, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* ================= خلفية الفضاء والنجوم ================= */
        #space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; box-shadow: 0 0 10px white; }
        }

        /* ================= شاشة التحميل ================= */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 2px solid transparent;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ================= القائمة العلوية ================= */
        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        /* === لتغيير اللوجو، يمكنك استبدال النص بصورة === */
        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ================= القسم الرئيسي (Hero) ================= */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-img {
            width: 300px;
            animation: float 6s ease-in-out infinite;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .shop-all-btn {
            padding: 12px 30px;
            background: transparent;
            color: white;
            border: 1px solid white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .shop-all-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* ================= قسم المنتجات ================= */
        .collection {
            padding: 80px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px;
            margin-bottom: 50px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .product-card {
            text-align: center;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
        }

        .img-box {
            position: relative;
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        /* تأثير الإضاءة حول المنتج */
        .img-box::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 70%; height: 70%;
            transform: translate(-50%, -50%);
            background: white;
            filter: blur(40px);
            opacity: 0.1;
            transition: 0.4s;
            z-index: -1;
        }

        .product-card:hover .img-box::after { opacity: 0.3; }
        .product-card:hover { transform: translateY(-10px); }

        .product-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            transition: 0.4s;
        }

        .product-card:hover .product-img { transform: scale(1.05); }

        .product-info h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .product-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ================= صفحة المنتج (Modal) ================= */
        #product-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(5, 5, 8, 0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .close-btn {
            position: absolute;
            top: 30px; right: 5%;
            font-size: 40px;
            color: white;
            cursor: pointer;
            z-index: 1001;
        }

        .modal-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 5%;
            gap: 50px;
            align-items: center;
        }

        .modal-img-container img {
            width: 100%;
            max-width: 500px;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
            animation: float 6s ease-in-out infinite;
        }

        .modal-details h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 40px;
            margin-bottom: 10px;
        }

        .modal-details .price {
            font-size: 20px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .selectors { margin-bottom: 30px; }
        .selectors label { display: block; margin-bottom: 10px; font-size: 14px; color: #ccc;}
        
        .size-btn {
            background: transparent;
            border: 1px solid #444;
            color: white;
            padding: 10px 15px;
            margin-right: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .size-btn:hover, .size-btn.active { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .add-cart-btn {
            width: 100%;
            padding: 15px;
            background: white;
            color: black;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .add-cart-btn:hover { box-shadow: 0 0 25px rgba(255,255,255,0.6); }

        /* ================= الفوتر (الاشتراك) ================= */
        .footer {
            padding: 80px 5%;
            text-align: center;
            border-top: 1px solid #222;
        }
        .footer input {
            padding: 12px;
            background: transparent;
            border: 1px solid #444;
            color: white;
            width: 250px;
            outline: none;
        }
        .footer button {
            padding: 12px 20px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* ================= التجاوب مع الموبايل ================= */
        @media (max-width: 768px) {
            .modal-content { grid-template-columns: 1fr; margin-top: 50px;}
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div id="space-bg"></div>

    <nav>
        <a href="#" class="logo">VODIKA STORE</a>
        
        <ul class="nav-links">
            <li><a href="#">HOME</a></li>
            <li><a href="#catalog">CATALOG</a></li>
            <li><a href="#contact">CONTACT</a></li>
        </ul>
        <div style="color: white; font-size: 20px; cursor: pointer;">🛒</div>
    </nav>

    <header class="hero">
        <img src="صورة-المنتج-الرئيسي-هنا.png" alt="Hero Product" class="hero-img">
        <button class="shop-all-btn">SHOP ALL</button>
    </header>

    <section class="collection" id="catalog">
        <h2 class="section-title">Featured collection</h2>
        <div class="grid">
            
            <div class="product-card" onclick="openProduct('VODIKA HOODIE 1', 'LE 999.00 EGP', 'صورة-المنتج-الاول-هنا.png')">
                <div class="img-box">
                    <img src="صورة-المنتج-الاول-هنا.png" alt="Product 1" class="product-img">
                </div>
                <div class="product-info">
                    <h3>VODIKA HOODIE 1</h3>
                    <p>LE 999.00 EGP</p>
                </div>
            </div>

            <div class="product-card" onclick="openProduct('VODIKA HOODIE 2', 'LE 850.00 EGP', 'صورة-المنتج-الثاني-هنا.png')">
                <div class="img-box">
                    <img src="صورة-المنتج-الثاني-هنا.png" alt="Product 2" class="product-img">
                </div>
                <div class="product-info">
                    <h3>VODIKA HOODIE 2</h3>
                    <p>LE 850.00 EGP</p>
                </div>
            </div>

            <div class="product-card" onclick="openProduct('VODIKA JACKET', 'LE 1,200.00 EGP', 'صورة-المنتج-الثالث-هنا.png')">
                <div class="img-box">
                    <img src="صورة-المنتج-الثالث-هنا.png" alt="Product 3" class="product-img">
                </div>
                <div class="product-info">
                    <h3>VODIKA JACKET</h3>
                    <p>LE 1,200.00 EGP</p>
                </div>
            </div>

        </div>
    </section>

    <div id="product-modal">
        <div class="close-btn" onclick="closeProduct()">&times;</div>
        <div class="modal-content">
            <div class="modal-img-container">
                <img id="modal-img" src="" alt="Product">
            </div>
            <div class="modal-details">
                <h2 id="modal-title">Product Name</h2>
                <div class="price" id="modal-price">LE 00.00 EGP</div>
                
                <div class="selectors">
                    <label>Size</label>
                    <button class="size-btn">S</button>
                    <button class="size-btn active">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                </div>

                <div class="selectors" style="display: flex; gap: 20px; align-items: center;">
                    <label style="margin: 0;">Quantity</label>
                    <input type="number" value="1" min="1" style="width: 60px; padding: 5px; background: transparent; color: white; border: 1px solid #444; text-align: center;">
                </div>

                <button class="add-cart-btn">ADD TO CART</button>
                <p style="margin-top: 15px; color: #aaa; font-size: 14px; text-decoration: underline; cursor: pointer;">SIZE CHART</p>
            </div>
        </div>
    </div>

    <section class="footer" id="contact">
        <p style="margin-bottom: 20px; font-family: 'Rajdhani', sans-serif; font-size: 20px;">Subscribe to our emails</p>
        <div>
            <input type="email" placeholder="Email">
            <button>&rarr;</button>
        </div>
    </section>

    <script>
        // إخفاء شاشة التحميل عند فتح الموقع
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
            }, 800);
            createStars();
        });

        // إنشاء النجوم في الخلفية برمجياً
        function createStars() {
            const bg = document.getElementById('space-bg');
            for (let i = 0; i < 150; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                let size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.animationDuration = (Math.random() * 3 + 1) + 's';
                star.style.animationDelay = Math.random() * 2 + 's';
                bg.appendChild(star);
            }
        }

        // فتح وإغلاق نافذة المنتج
        const modal = document.getElementById('product-modal');
        const loader = document.getElementById('loader');

        function openProduct(title, price, imgSrc) {
            // محاكاة التحميل عند فتح المنتج كما في الفيديو
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            
            setTimeout(() => {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-price').innerText = price;
                document.getElementById('modal-img').src = imgSrc;
                
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    modal.style.display = 'block';
                    setTimeout(() => { modal.style.opacity = '1'; }, 10);
                    document.body.style.overflow = 'hidden'; // إيقاف التمرير في الخلفية
                }, 300);
            }, 600);
        }

        function closeProduct() {
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto'; // إعادة التمرير
            }, 400);
        }

        // تفاعلات أزرار المقاسات
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
